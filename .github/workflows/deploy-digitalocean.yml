name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-to-digitalocean:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./AutoHoneyX
          file: ./AutoHoneyX/Dockerfile.prod
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DigitalOcean Droplet
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Install doctl (DigitalOcean CLI)
          cd ~
          wget -q https://github.com/digitalocean/doctl/releases/download/v1.102.2/doctl-1.102.2-linux-amd64.tar.gz
          tar xf doctl-1.102.2-linux-amd64.tar.gz
          sudo mv doctl /usr/local/bin
          
          # Authenticate with DigitalOcean
          doctl auth init --access-token $DIGITALOCEAN_ACCESS_TOKEN
          
          # Get list of active droplets
          doctl compute droplet list --format Name,ID,Status --no-header
          
          echo "✅ DigitalOcean authentication successful"

      - name: Print Deployment Instructions
        run: |
          echo "=========================================="
          echo "🚀 DEPLOYMENT READY!"
          echo "=========================================="
          echo ""
          echo "Your project is ready to deploy to DigitalOcean."
          echo ""
          echo "📋 NEXT STEPS:"
          echo "1. Create a DigitalOcean Droplet (Ubuntu 22.04, $6/month)"
          echo "2. SSH into droplet and run:"
          echo ""
          echo "   curl -fsSL https://get.docker.com | sh"
          echo "   sudo curl -L https://github.com/docker/compose/releases/latest/download/docker-compose-\$(uname -s)-\$(uname -m) -o /usr/local/bin/docker-compose"
          echo "   sudo chmod +x /usr/local/bin/docker-compose"
          echo "   git clone https://github.com/nikhil9622/autohoneyx.git /opt/autohoneyx"
          echo "   cd /opt/autohoneyx/AutoHoneyX"
          echo "   sudo docker-compose -f docker-compose.prod.yml up -d"
          echo ""
          echo "3. Access your app at:"
          echo "   - Dashboard: http://your-droplet-ip:8501"
          echo "   - API: http://your-droplet-ip:8000"
          echo ""
          echo "📖 See DEPLOYMENT_SETUP.md for complete instructions"
          echo "=========================================="
