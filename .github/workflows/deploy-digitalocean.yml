name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./AutoHoneyX
          file: ./AutoHoneyX/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to DigitalOcean App Platform
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          APP_NAME: autohoneyx-prod
        run: |
          # Install doctl CLI
          cd ~
          wget https://github.com/digitalocean/doctl/releases/download/v1.102.2/doctl-1.102.2-linux-amd64.tar.gz
          tar xf doctl-1.102.2-linux-amd64.tar.gz
          sudo mv doctl /usr/local/bin
          
          # Authenticate
          doctl auth init --access-token $DIGITALOCEAN_ACCESS_TOKEN
          
          # Get or create app
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep $APP_NAME | awk '{print $1}')
          
          if [ -z "$APP_ID" ]; then
            echo "Creating new DigitalOcean App..."
            doctl apps create --spec app.yaml
          else
            echo "Updating existing DigitalOcean App..."
            doctl apps update $APP_ID --spec app.yaml
          fi

      - name: Notify Deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'AutoHoneyX deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
