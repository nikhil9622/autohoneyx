name: credential_compromise_response
description: Automated response to detected credential compromise
version: "1.0"
author: AutoHoneyX Security Team
enabled: true

triggers:
  - honeytoken_accessed
  - credential_leak_detected
  - aws_key_used
  - database_credential_used

scenarios:
  - name: immediate_response
    description: Immediate actions on credential compromise - block, reset, alert
    enabled: true
    actions:
      - action: alert_team
        params:
          channels: [slack, email, pagerduty]
          severity: CRITICAL
          message: |
            🚨 CRITICAL: Credential compromise detected!
            Immediate response actions are being executed.
      
      - action: block_ip
        params:
          ip: "{{source_ip}}"
          reason: "Credential compromise source IP"
          duration_hours: 24
      
      - action: reset_credentials
        params:
          credential_type: aws
          scope: all
          notify_users: true
      
      - action: reset_credentials
        params:
          credential_type: database
          scope: all
          notify_users: true
      
      - action: kill_process
        params:
          process_name: ssh
          reason: "Terminating sessions from compromised source"
          force: true

  - name: investigation
    description: Deep investigation and forensic analysis
    enabled: true
    actions:
      - action: alert_team
        params:
          channels: [slack]
          severity: HIGH
          message: "🔍 Beginning investigation phase..."
      
      - action: simulate_scenario
        params:
          scenario_type: credential_reuse_detection
          target: "{{target_system}}"
          monitoring_duration_hours: 24

  - name: hardening
    description: Hardening measures after compromise
    enabled: true
    actions:
      - action: alert_team
        params:
          channels: [email]
          severity: HIGH
          message: |
            🔒 Credential Compromise Response Complete
            Recommended hardening measures:
            1. Review credential access logs for 7 days prior
            2. Implement MFA on all critical accounts
            3. Monitor for suspicious activity for 30 days
            4. Update security posture assessment

tags:
  - credential_theft
  - access_control
  - incident_response
  - critical

estimated_execution_time_seconds: 45
