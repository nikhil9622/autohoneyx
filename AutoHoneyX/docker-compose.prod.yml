version: '3.8'

# ============================================================================
# AutoHoneyX Real-Time Secret Detection System
# GitGuardian-Style Cloud Deployment (Docker Compose)
# ============================================================================

services:
  # ========================================================================
  # Redis (Event Bus + Rate limiting storage)
  # ========================================================================
  redis:
    image: redis:7-alpine
    container_name: autohoneyx_redis_prod
    ports:
      - "6379:6379"
    networks:
      - autohoneyx_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  # ========================================================================
  # Database (PostgreSQL)
  # ========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: autohoneyx_db_prod
    environment:
      POSTGRES_USER: ${DB_USER:-autohoneyx}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-autohoneyx_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-autohoneyx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autohoneyx_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  # ========================================================================
  # Real-Time API Server
  # ========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: autohoneyx_api_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER:-autohoneyx}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-autohoneyx_db}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-300}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RATE_LIMIT_STORAGE_URI: ${RATE_LIMIT_STORAGE_URI:-redis://redis:6379/1}
    volumes:
      - ./logs:/app/logs
      - /etc/letsencrypt/live/your-domain.com:/etc/ssl/certs:ro
    ports:
      - "8000:8000"
      - "443:443"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - autohoneyx_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ========================================================================
  # Real-Time Monitoring Service
  # ========================================================================
  monitor:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: autohoneyx_monitor_prod
    command: python -m monitoring.monitor_service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-autohoneyx}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-autohoneyx_db}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MONITORED_REPOS: ${MONITORED_REPOS}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-300}
      AUTO_REMEDIATE: ${AUTO_REMEDIATE:-false}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # For docker scanning
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - autohoneyx_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ========================================================================
  # SSH Honeypot
  # ========================================================================
  ssh_honeypot:
    build:
      context: .
      dockerfile: honeypots/ssh/Dockerfile.prod
    container_name: autohoneyx_ssh_prod
    environment:
      SSH_HONEYPOT_PORT: ${SSH_HONEYPOT_PORT:-2222}
      DATABASE_URL: postgresql://${DB_USER:-autohoneyx}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-autohoneyx_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./logs/ssh:/app/logs:rw
    ports:
      - "${SSH_HONEYPOT_PORT:-2222}:${SSH_HONEYPOT_PORT:-2222}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autohoneyx_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /run
    restart: unless-stopped

  # ========================================================================
  # Web Honeypot (HTTP)
  # ========================================================================
  web_honeypot:
    build:
      context: honeypots/web
      dockerfile: Dockerfile.prod
    container_name: autohoneyx_web_honeypot_prod
    environment:
      WEB_PORT: ${WEB_HONEYPOT_PORT:-8080}
      DATABASE_URL: postgresql://${DB_USER:-autohoneyx}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-autohoneyx_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./logs/web:/app/logs:rw
    ports:
      - "${WEB_HONEYPOT_PORT:-8080}:${WEB_HONEYPOT_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autohoneyx_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  # ========================================================================
  # Attack Processor (consume events + run analysis)
  # ========================================================================
  processor:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: autohoneyx_processor_prod
    command: python -m monitoring.attack_event_consumer
    environment:
      DATABASE_URL: postgresql://${DB_USER:-autohoneyx}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-autohoneyx_db}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ATTACK_PROCESSOR_WORKERS: ${ATTACK_PROCESSOR_WORKERS:-3}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - autohoneyx_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

networks:
  autohoneyx_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
