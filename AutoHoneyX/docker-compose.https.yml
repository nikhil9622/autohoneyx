version: '3.8'

services:
  # Redis (Event Bus)
  redis:
    image: redis:7-alpine
    container_name: autohoneyx_redis
    ports:
      - "6379:6379"
    networks:
      - autohoneyx_network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: autohoneyx_db
    environment:
      POSTGRES_USER: autohoneyx
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: autohoneyx_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - autohoneyx_network
    restart: unless-stopped

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: autohoneyx_api
    environment:
      DATABASE_URL: postgresql://autohoneyx:secure_password@postgres:5432/autohoneyx_db
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      API_PORT: 8000
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    depends_on:
      - redis
      - postgres
    networks:
      - autohoneyx_network
    restart: unless-stopped

  # Dashboard
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: autohoneyx_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      DATABASE_URL: postgresql://autohoneyx:secure_password@postgres:5432/autohoneyx_db
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8501"
    depends_on:
      - api
      - postgres
    networks:
      - autohoneyx_network
    restart: unless-stopped

  # Nginx Reverse Proxy + HTTPS
  nginx:
    image: nginx:latest
    container_name: autohoneyx_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - app
    networks:
      - autohoneyx_network
    restart: unless-stopped

networks:
  autohoneyx_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
